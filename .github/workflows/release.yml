# 在推送到 main 且存在可发布提交（feat/fix/perf 等）时：
# 自动 bump 版本、同步各包 package.json、写入 CHANGELOG、构建 DMG、创建 GitHub Release 并上传产物。
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # 桌面 DMG 需在 macOS 上构建；与本地 pnpm run package:desktop 行为一致
    runs-on: macos-latest
    steps:
      # v5+ 以 Node 24 为 Action 运行时，避免仍标为 node20 时的弃用告警
      # @see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      # 不在这里写 version：与根 package.json 的 packageManager（pnpm@10.0.0）二选一会触发 ERR_PNPM_BAD_PM_VERSION
      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Quality gate
        run: pnpm run lint && pnpm run typecheck && pnpm run format:check

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 避免 release 提交触发 husky 等与 CI 无关的钩子
          HUSKY: "0"
        run: pnpm exec semantic-release
